<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account | OMS Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="navbar">
    <div class="logo">OMS Store</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="catalog.html">Catalog</a>
      <a href="orders.html">Orders</a>
      <a href="account.html">Account</a>
    </nav>
  </header>

  <main class="page-container">
    <section class="page-header">
      <h1>My Account</h1>
      <p>View and edit your personal information, shipping address, and account preferences.</p>
    </section>

    <section class="account-layout">
      <div class="account-card">
        <h2>Personal Information</h2>

        <form>
          <label for="name">Full Name</label>
          <input type="text" id="name" value="Jordan Smith" />

          <label for="email">Email Address</label>
          <input type="email" id="email" value="jordansmith@email.com" />

          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" value="(555) 123-4567" />

          <button type="submit" class="secondary-btn">Save Changes</button>
        </form>
      </div>

      <div class="account-card">
        <h2>Shipping Address</h2>

        <form>
          <label for="street">Street Address</label>
          <input type="text" id="street" value="123 Main Street" />

          <label for="city">City</label>
          <input type="text" id="city" value="Hoboken" />

          <label for="state">State</label>
          <input type="text" id="state" value="NJ" />

          <label for="zip">ZIP Code</label>
          <input type="text" id="zip" value="07030" />

          <button type="submit" class="secondary-btn">Update Address</button>
        </form>
      </div>

      <div class="account-card">
        <h2>Account Preferences</h2>

        <form>
          <label for="newsletter">Email Notifications</label>
          <select id="newsletter">
            <option>Enabled</option>
            <option>Disabled</option>
          </select>

          <label for="delivery">Preferred Delivery Method</label>
          <select id="delivery">
            <option>Standard Shipping</option>
            <option>Express Shipping</option>
            <option>Store Pickup</option>
          </select>

          <button type="submit" class="secondary-btn">Save Preferences</button>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 OMS Store. All rights reserved.</p>
  </footer>

</body>
</html>
